name: Tests

on:
  push:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
        pytest-version: ["7", "8"]
        urllib3-version: ["1", "2"]
        exclude:
          - python-version: "3.9"
            pytest-version: "8"

    name: py${{ matrix.python-version }} / pytest${{ matrix.pytest-version }} / urllib3v${{ matrix.urllib3-version }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Determine tox env name
        id: tox-env
        run: |
          py_nodot=$(echo "${{ matrix.python-version }}" | tr -d '.')
          echo "env=py${py_nodot}-pytest${{ matrix.pytest-version }}-urllib3${{ matrix.urllib3-version }}" >> "$GITHUB_OUTPUT"

      - name: Run tests via tox
        run: uvx --with tox-uv tox run -e ${{ steps.tox-env.outputs.env }}
